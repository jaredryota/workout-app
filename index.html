<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="筋トレログ">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<title>筋トレログ</title>
<style>
:root{
  --bg:#111;--bg2:#1c1c1e;--bg3:#2c2c2e;
  --bdr:#3a3a3c;--tx:#f5f5f7;--mt:#8e8e93;
  --ac:#e8ff5a;--r:14px;
  --st:env(safe-area-inset-top,44px);
  --sb:env(safe-area-inset-bottom,20px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.hdr{
  padding:calc(var(--st) + 8px) 20px 12px;
  background:var(--bg);border-bottom:.5px solid var(--bdr);
  flex-shrink:0;
}
.ht{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--tx)}
.hs{font-size:13px;color:var(--mt);margin-top:2px}
.content{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding-bottom:calc(58px + var(--sb) + 16px);
}
.tabbar{
  display:flex;background:var(--bg);border-top:.5px solid var(--bdr);
  padding-bottom:var(--sb);flex-shrink:0;
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(58px + var(--sb));
}
.tab{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;border:none;background:none;
  color:var(--mt);font-size:10px;cursor:pointer;padding:8px 0 4px;
}
.tab.active{color:var(--ac)}
.tab-ic{font-size:24px;line-height:1}
.page{display:none}.page.active{display:block}

/* Group grid */
.groups{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.gcard{
  background:var(--bg2);border:.5px solid var(--bdr);
  border-radius:var(--r);padding:16px 12px 14px;
  cursor:pointer;text-align:center;transition:background .1s;
}
.gcard:active{background:var(--bg3)}
.gcard-svg{width:60px;height:60px;margin:0 auto 10px;display:block}
.gcard-svg svg{width:60px;height:60px;display:block}
.gcard-name{font-size:16px;font-weight:700;color:var(--tx)}
.gcard-sub{font-size:11px;color:var(--mt);margin-top:3px;line-height:1.4}
.gcard-cnt{font-size:11px;color:var(--mt);margin-top:5px}

/* Back */
.back{
  display:flex;align-items:center;gap:4px;
  padding:14px 20px 6px;font-size:16px;color:var(--ac);
  background:none;border:none;cursor:pointer;
}

/* Group head */
.gh{padding:8px 20px 16px}
.gh-svg{width:48px;height:48px}
.gh-svg svg{width:48px;height:48px;display:block}
.gh-name{font-size:22px;font-weight:700;margin-top:8px;color:var(--tx)}
.gh-sub{font-size:14px;color:var(--mt);margin-top:3px}

/* Exercise list */
.exlist{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px}
.exitem{
  background:var(--bg2);border:.5px solid var(--bdr);
  border-radius:var(--r);display:flex;align-items:center;
  overflow:hidden;cursor:pointer;transition:background .1s;
}
.exitem:active{background:var(--bg3)}
.ex-thumb{
  width:80px;height:80px;flex-shrink:0;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;padding:10px;
}
.ex-thumb svg{width:58px;height:58px;display:block}
.ex-info{flex:1;padding:12px 14px}
.ex-name{font-size:15px;font-weight:600;color:var(--tx)}
.ex-type{font-size:12px;color:var(--mt);margin-top:3px}
.ex-arrow{color:var(--mt);font-size:20px;padding-right:14px}

/* Log */
.log-sel{
  display:flex;align-items:center;
  background:var(--bg2);border:.5px solid var(--bdr);
  border-radius:var(--r);margin:0 16px 20px;overflow:hidden;
}
.log-thumb{
  width:88px;height:88px;flex-shrink:0;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;padding:12px;
}
.log-thumb svg{width:62px;height:62px;display:block}
.log-info{padding:14px}
.log-name{font-size:16px;font-weight:700;color:var(--tx)}
.log-cat{font-size:12px;color:var(--mt);margin-top:4px}
.slbl{
  font-size:12px;font-weight:600;color:var(--mt);
  text-transform:uppercase;letter-spacing:.08em;
  padding:0 20px;margin-bottom:10px;
}
.sets{padding:0 16px;display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.srow{
  background:var(--bg2);border:.5px solid var(--bdr);
  border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:10px;
}
.snum{font-size:13px;color:var(--mt);font-weight:600;min-width:52px}
.sinps{flex:1;display:flex;align-items:center;gap:6px}
.sinp{
  background:var(--bg3);border:.5px solid var(--bdr);
  border-radius:8px;color:var(--tx);font-size:17px;font-weight:600;
  padding:8px;text-align:center;-webkit-appearance:none;width:68px;
}
.sinp:focus{outline:none;border-color:var(--ac)}
.sunit{font-size:13px;color:var(--mt)}
.sdel{background:none;border:none;color:var(--mt);font-size:20px;cursor:pointer;padding:4px 8px}
.add-set{
  margin:0 16px 20px;background:none;
  border:1px dashed var(--bdr);border-radius:var(--r);
  padding:13px;width:calc(100% - 32px);color:var(--mt);font-size:15px;cursor:pointer;
}
.memo-wrap{padding:0 16px;margin-bottom:28px}
.memo-inp{
  width:100%;background:var(--bg2);border:.5px solid var(--bdr);
  border-radius:var(--r);color:var(--tx);font-size:15px;
  padding:12px 14px;font-family:inherit;resize:none;min-height:76px;
}
.memo-inp:focus{outline:none;border-color:var(--ac)}
.save-btn{
  margin:0 16px;width:calc(100% - 32px);
  background:var(--ac);color:#111;border:none;
  border-radius:var(--r);padding:16px;
  font-size:16px;font-weight:700;cursor:pointer;
}
.save-btn:active{opacity:.85}

/* History */
.hist{padding:16px;display:flex;flex-direction:column;gap:10px}
.hcard{
  background:var(--bg2);border:.5px solid var(--bdr);
  border-radius:var(--r);overflow:hidden;
}
.hcard-top{display:flex;align-items:stretch}
.hthumb{
  width:76px;flex-shrink:0;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;padding:10px;
}
.hthumb svg{width:54px;height:54px;display:block}
.hbody{flex:1;padding:12px 14px}
.hname{font-size:15px;font-weight:600;color:var(--tx)}
.hdate{font-size:12px;color:var(--mt);margin-top:3px}
.hdel{background:none;border:none;color:var(--mt);cursor:pointer;font-size:20px;padding:12px 14px;align-self:flex-start}
.pills{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px 12px}
.pill{background:var(--bg3);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--mt)}
.hmemo{font-size:13px;color:var(--mt);padding:0 14px 12px;font-style:italic;border-top:.5px solid var(--bdr);padding-top:8px}
.empty{text-align:center;padding:72px 20px;color:var(--mt);font-size:15px;line-height:1.6}

/* Stats */
.spad{padding:16px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.sbox{background:var(--bg2);border:.5px solid var(--bdr);border-radius:var(--r);padding:14px 8px;text-align:center}
.sval{font-size:24px;font-weight:700;color:var(--ac)}
.slb2{font-size:11px;color:var(--mt);margin-top:4px}
.clbl{font-size:12px;font-weight:600;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.brow{margin-bottom:12px}
.btop{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:var(--tx)}
.bcnt{color:var(--mt);font-size:12px}
.btrack{background:var(--bg3);border-radius:4px;height:8px}
.bfill{background:var(--ac);height:8px;border-radius:4px}
.grow{
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);border:.5px solid var(--bdr);
  border-radius:12px;padding:10px 14px;margin-bottom:8px;
}
.grow-svg{width:32px;height:32px;flex-shrink:0}
.grow-svg svg{width:32px;height:32px;display:block}
.grow-name{flex:1;font-size:14px;color:var(--tx)}
.grow-cnt{font-size:14px;font-weight:700;color:var(--ac)}

/* Toast */
.toast{
  position:fixed;top:calc(var(--st) + 60px);left:50%;
  transform:translateX(-50%) translateY(-12px);
  background:var(--ac);color:#111;padding:10px 22px;
  border-radius:24px;font-size:14px;font-weight:700;
  opacity:0;pointer-events:none;transition:all .2s;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="ht" id="ht">💪 筋トレログ</div>
    <div class="hs" id="hs">今日も頑張ろう！</div>
  </div>
  <div class="content">
    <div class="page active" id="pg-groups">
      <div class="groups" id="groups-grid"></div>
    </div>
    <div class="page" id="pg-exlist">
      <button class="back" onclick="goBack('pg-groups')">‹ 部位を選ぶ</button>
      <div class="gh">
        <div class="gh-svg" id="gh-svg"></div>
        <div class="gh-name" id="gh-name"></div>
        <div class="gh-sub" id="gh-sub"></div>
      </div>
      <div class="exlist" id="exlist"></div>
    </div>
    <div class="page" id="pg-log">
      <button class="back" id="log-back">‹ 種目を選ぶ</button>
      <div class="log-sel">
        <div class="log-thumb" id="log-thumb"></div>
        <div class="log-info">
          <div class="log-name" id="log-name"></div>
          <div class="log-cat" id="log-cat"></div>
        </div>
      </div>
      <div class="slbl">セット記録</div>
      <div class="sets" id="sets-wrap"></div>
      <button class="add-set" onclick="addSet()">＋ セットを追加</button>
      <div class="slbl">メモ</div>
      <div class="memo-wrap">
        <textarea class="memo-inp" id="memo-inp" placeholder="気づきや感想を..."></textarea>
      </div>
      <button class="save-btn" onclick="saveRec()">記録する</button>
    </div>
    <div class="page" id="pg-history">
      <div class="hist" id="hist-list"></div>
    </div>
    <div class="page" id="pg-stats">
      <div class="spad">
        <div class="sgrid">
          <div class="sbox"><div class="sval" id="st-total">0</div><div class="slb2">総記録</div></div>
          <div class="sbox"><div class="sval" id="st-days">0</div><div class="slb2">日数</div></div>
          <div class="sbox"><div class="sval" id="st-sets">0</div><div class="slb2">総セット</div></div>
        </div>
        <div class="clbl">よくやる種目</div>
        <div id="st-bars"></div>
        <div class="clbl" style="margin-top:20px">部位別セット数</div>
        <div id="st-grps"></div>
      </div>
    </div>
  </div>
  <div class="tabbar">
    <button class="tab active" data-pg="pg-groups" onclick="swTab(this,'pg-groups')">
      <div class="tab-ic">🏋️</div><span>記録</span>
    </button>
    <button class="tab" data-pg="pg-history" onclick="swTab(this,'pg-history')">
      <div class="tab-ic">📋</div><span>履歴</span>
    </button>
    <button class="tab" data-pg="pg-stats" onclick="swTab(this,'pg-stats')">
      <div class="tab-ic">📊</div><span>統計</span>
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>

let records=[],selGrp=null,selEx=null,sets=[];

function svg(name){return SVGS[name]||'<svg viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="20" fill="#3a3a3c"/></svg>';}

function loadRecs(){
  try{const s=localStorage.getItem('wlog_v4');if(s)records=JSON.parse(s);}catch(e){records=[];}
}
function saveRecs(){try{localStorage.setItem('wlog_v4',JSON.stringify(records));}catch(e){}}

function renderGroups(){
  document.getElementById('groups-grid').innerHTML=GROUPS.map(g=>{
    const cnt=records.filter(r=>r.gid===g.id).length;
    return `<div class="gcard" onclick="selGroup('${g.id}')">
      <div class="gcard-svg">${svg('group_'+g.id)}</div>
      <div class="gcard-name">${g.name}</div>
      <div class="gcard-sub">${g.sub}</div>
      <div class="gcard-cnt">${cnt>0?cnt+'回記録済み':'種目を選ぶ ›'}</div>
    </div>`;
  }).join('');
}

function selGroup(id){
  selGrp=GROUPS.find(g=>g.id===id);
  const exs=EXERCISES[id];
  document.getElementById('gh-svg').innerHTML=svg('group_'+id);
  document.getElementById('gh-name').textContent=selGrp.name;
  document.getElementById('gh-sub').textContent=selGrp.sub;
  document.getElementById('exlist').innerHTML=exs.map(e=>`
    <div class="exitem" onclick="selExFn('${e.name}','${e.type}',${e.w})">
      <div class="ex-thumb">${svg(e.name)}</div>
      <div class="ex-info">
        <div class="ex-name">${e.name}</div>
        <div class="ex-type">${e.type}</div>
      </div>
      <div class="ex-arrow">›</div>
    </div>`).join('');
  showPage('pg-exlist');
  setHdr(selGrp.name,selGrp.sub);
}

function selExFn(name,type,needsW){
  selEx={name,type,needsW};
  sets=[{w:'',r:''}];
  document.getElementById('log-thumb').innerHTML=svg(name);
  document.getElementById('log-name').textContent=name;
  document.getElementById('log-cat').textContent=selGrp.name+' · '+type;
  document.getElementById('memo-inp').value='';
  renderSets();
  showPage('pg-log');
  setHdr(name,type);
}
document.getElementById('log-back').onclick=()=>{showPage('pg-exlist');setHdr(selGrp.name,selGrp.sub);};

function addSet(){sets.push({w:'',r:''});renderSets();}
function rmSet(i){if(sets.length>1){sets.splice(i,1);renderSets();}}
function renderSets(){
  document.getElementById('sets-wrap').innerHTML=sets.map((s,i)=>`
    <div class="srow">
      <span class="snum">セット ${i+1}</span>
      <div class="sinps">
        ${selEx.needsW?`<input class="sinp" type="number" inputmode="decimal" placeholder="0" value="${s.w}" onchange="sets[${i}].w=this.value" style="width:68px"><span class="sunit">kg</span>`:''}
        <input class="sinp" type="number" inputmode="numeric" placeholder="0" value="${s.r}" onchange="sets[${i}].r=this.value" style="width:62px">
        <span class="sunit">回</span>
      </div>
      <button class="sdel" onclick="rmSet(${i})">✕</button>
    </div>`).join('');
}

function saveRec(){
  const vs=sets.filter(s=>s.r!==''&&s.r!=='0');
  if(!vs.length){showToast('回数を入力してください');return;}
  const now=new Date();
  records.unshift({
    id:Date.now(),gid:selGrp.id,gname:selGrp.name,
    name:selEx.name,type:selEx.type,needsW:selEx.needsW,
    sets:vs,memo:document.getElementById('memo-inp').value,
    date:now.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}),
    ts:now.getTime()
  });
  saveRecs();renderGroups();renderHist();renderStats();
  showToast('✓ 記録しました！');
  sets=[{w:'',r:''}];
  showPage('pg-groups');setHdr('💪 筋トレログ','今日も頑張ろう！');
  swTabById('pg-groups');
}

function renderHist(){
  const el=document.getElementById('hist-list');
  if(!records.length){
    el.innerHTML='<div class="empty">まだ記録がありません<br>最初のトレーニングを記録しよう！</div>';
    return;
  }
  el.innerHTML=records.map(r=>`
    <div class="hcard">
      <div class="hcard-top">
        <div class="hthumb">${svg(r.name)}</div>
        <div class="hbody">
          <div class="hname">${r.name}</div>
          <div class="hdate">${r.gname} · ${r.date}</div>
        </div>
        <button class="hdel" onclick="delRec(${r.id})">🗑</button>
      </div>
      <div class="pills">
        ${r.sets.map((s,i)=>`<span class="pill">S${i+1}: ${r.needsW&&s.w?s.w+'kg×':''}${s.r}回</span>`).join('')}
      </div>
      ${r.memo?`<div class="hmemo">${r.memo}</div>`:''}
    </div>`).join('');
}

function delRec(id){
  records=records.filter(r=>r.id!==id);
  saveRecs();renderHist();renderStats();renderGroups();
}

function renderStats(){
  document.getElementById('st-total').textContent=records.length;
  document.getElementById('st-days').textContent=new Set(records.map(r=>r.date)).size;
  document.getElementById('st-sets').textContent=records.reduce((a,r)=>a+r.sets.length,0);
  const ec={};records.forEach(r=>{ec[r.name]=(ec[r.name]||0)+1;});
  const t5=Object.entries(ec).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const mx=t5[0]?.[1]||1;
  document.getElementById('st-bars').innerHTML=t5.length
    ?t5.map(([n,c])=>`<div class="brow"><div class="btop"><span>${n}</span><span class="bcnt">${c}回</span></div><div class="btrack"><div class="bfill" style="width:${Math.round(c/mx*100)}%"></div></div></div>`).join('')
    :'<div style="color:var(--mt);font-size:14px;padding:8px 0">データがまだありません</div>';
  const gc={};records.forEach(r=>{gc[r.gid]=(gc[r.gid]||0)+r.sets.length;});
  document.getElementById('st-grps').innerHTML=GROUPS.filter(g=>gc[g.id]).sort((a,b)=>(gc[b.id]||0)-(gc[a.id]||0))
    .map(g=>`<div class="grow"><div class="grow-svg">${svg('group_'+g.id)}</div><span class="grow-name">${g.name}</span><span class="grow-cnt">${gc[g.id]}セット</span></div>`).join('')
    ||'<div style="color:var(--mt);font-size:14px;padding:8px 0">データがまだありません</div>';
}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setHdr(t,s){document.getElementById('ht').textContent=t;document.getElementById('hs').textContent=s;}
function swTab(btn,pg){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  showPage(pg);
  if(pg==='pg-groups')setHdr('💪 筋トレログ','今日も頑張ろう！');
  if(pg==='pg-history')setHdr('📋 履歴','過去の記録');
  if(pg==='pg-stats')setHdr('📊 統計','トレーニング分析');
}
function swTabById(pg){const b=document.querySelector(`[data-pg="${pg}"]`);if(b)swTab(b,pg);}
function goBack(pg){showPage(pg);if(pg==='pg-groups')setHdr('💪 筋トレログ','今日も頑張ろう！');}
